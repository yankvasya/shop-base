name: E2E

# These tests hit the real Shopify Storefront API — no mocking — so they
# run against a real dev server booted with live credentials. That's not
# something to do on every push (each run creates real carts/checkouts on
# the live store), so this is opt-in: manual trigger or a weekly check.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec playwright install --with-deps chromium

      - run: pnpm test:e2e
        env:
          NUXT_PUBLIC_SHOPIFY_STORE_DOMAIN: ${{ secrets.SHOPIFY_STORE_DOMAIN }}
          NUXT_PUBLIC_SHOPIFY_STOREFRONT_TOKEN: ${{ secrets.SHOPIFY_STOREFRONT_TOKEN }}
          NUXT_PUBLIC_SHOPIFY_API_VERSION: '2025-10'
          NUXT_PUBLIC_SITE_URL: http://localhost:3000
          NUXT_SESSION_PASSWORD: ${{ secrets.NUXT_SESSION_PASSWORD }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
